services:
  # -------------------------------------------------------------------------
  # postgres — profile-less on purpose: `docker compose up -d postgres` (the
  # dev flow) stays byte-for-byte unchanged. Host port 5433 -> in-network 5432.
  # The healthcheck is the gate the stack services wait on.
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: promocean
      POSTGRES_PASSWORD: promocean
      POSTGRES_DB: promocean
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promocean"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------------
  # cms (Strapi) — seeds the demo project/keys on first boot when SEED_DEMO=true
  # and the DB is empty. Waits for postgres to be healthy.
  # -------------------------------------------------------------------------
  cms:
    profiles: ["stack"]
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "1337:1337"
    environment:
      HOST: 0.0.0.0
      PORT: "1337"
      DATABASE_URL: postgres://promocean:promocean@postgres:5432/promocean
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CONFIG_PLANE_SECRET: ${CONFIG_PLANE_SECRET}
      SEED_DEMO: ${SEED_DEMO:-true}
      LOG_PLAINTEXT_KEYS: ${LOG_PLAINTEXT_KEYS:-false}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Admin}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-User}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}

  # -------------------------------------------------------------------------
  # api (Hono) — runs drizzle migrations at boot. Waits for postgres healthy
  # AND cms healthy (it reads the config-plane from Strapi). /readyz probe.
  # -------------------------------------------------------------------------
  api:
    profiles: ["stack"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      cms:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      API_PORT: "3001"
      DATABASE_URL: postgres://promocean:promocean@postgres:5432/promocean
      STRAPI_URL: http://cms:1337
      CONFIG_PLANE_SECRET: ${CONFIG_PLANE_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-300}
      RATE_LIMIT_MAX_BUCKETS: ${RATE_LIMIT_MAX_BUCKETS:-10000}
      WEBHOOK_REDELIVERY_GRACE_MINUTES: ${WEBHOOK_REDELIVERY_GRACE_MINUTES:-5}
      TIMED_EVENT_SCAN_GRACE_MINUTES: ${TIMED_EVENT_SCAN_GRACE_MINUTES:-60}
      WEBHOOK_DEAD_LETTER_TTL_DAYS: ${WEBHOOK_DEAD_LETTER_TTL_DAYS:-30}

  # -------------------------------------------------------------------------
  # demo (Next.js) — NEXT_PUBLIC_* are baked at build (browser bundle); the
  # secret key + server-side API URL are runtime env. Waits for api healthy.
  # -------------------------------------------------------------------------
  demo:
    profiles: ["stack"]
    build:
      context: .
      dockerfile: apps/demo/Dockerfile
      args:
        NEXT_PUBLIC_PROMOCEAN_KEY: ${NEXT_PUBLIC_PROMOCEAN_KEY:-pk_test_demo_1234567890abcdef}
        NEXT_PUBLIC_PROMOCEAN_API: ${NEXT_PUBLIC_PROMOCEAN_API:-http://localhost:3001}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      # Server-side (React Server Component) calls stay in-network.
      PROMOCEAN_API_URL: http://api:3001
      PROMOCEAN_SECRET_KEY: ${PROMOCEAN_SECRET_KEY:-sk_test_demo_1234567890abcdef}

volumes:
  pgdata:
